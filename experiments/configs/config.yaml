train_config:
  learning_rate: 0.001
  weight_decay: 0.001
  max_epochs: 30
  batch_size: 32
  num_workers: 4
  accelerator: gpu
  patience: 5

model_config:
  text_mlp:
    in_dim: 768
    hidden_dim: 768
    out_dim: 512
    dropout: 0.0
  video_mlp:
    in_dim: 768
    hidden_dim: 768
    out_dim: 512
    dropout: 0.0

logging_config:
  project_name: ""
  exp_name: ""
  log_dir: "experiments/logs/"
  checkpoint_dir: "experiments/checkpoints/"
  checkpoint_name: ""