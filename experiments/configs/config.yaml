train_config:
  learning_rate: 0.0005
  weight_decay: 0.0001
  max_epochs: 100
  eta_min: 0.000001
  batch_size: 64
  num_workers: 4
  temperature: 0.7
  accelerator: gpu

model_config:
  text_mlp:
    in_dim: 768
    hidden_dim: 768
    out_dim: 256
    dropout: 0.1
  video_mlp:
    in_dim: 768
    hidden_dim: 768
    out_dim: 256
    dropout: 0.1

logging_config:
  project_name: "adapter_test"
  exp_name: "adapter_test_code"
  log_dir: "experiments/logs"
  checkpoint_dir: "experiments/checkpoints"