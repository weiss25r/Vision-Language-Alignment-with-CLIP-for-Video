train_config:
  learning_rate: 0.0001
  weight_decay: 0.01
  max_epochs: 1000
  batch_size: 512
  num_workers: 4
  accelerator: gpu
  patience: 10
  loss: clip
  feature_dir: ./data/features/timesformer/
  csv_dir: ./data/annotations/processed/
  frames_dir: ./data/sampled/
  batch_acc: 4
  egonce_temperature: 0.05

model_config:
  model: adapter
  text_mlp:
    in_dim: 768
    hidden_dim: 768
    out_dim: 512
    dropout: 0.1
  video_mlp:
    in_dim: 768
    hidden_dim: 768
    out_dim: 512
    dropout: 0.1

logging_config:
  project_name: "MLP42"
  exp_name: "MLP_timesformer_features"
  log_dir: "experiments/logs/timesformer/"
  checkpoint_dir: "experiments/checkpoints/timesformer/"

seed: 42