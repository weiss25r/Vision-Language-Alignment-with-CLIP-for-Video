train_config:
  learning_rate: 0.0001
  weight_decay: 0.01
  max_epochs: 40
  batch_size: 16
  num_workers: 4
  accelerator: gpu
  patience: 10
  loss: clip
  feature_dir: ./data/features/egovlp_plus/
  csv_dir: ./data/annotations/processed/
  frames_dir: ./data/sampled/
  batch_acc: 4

model_config:
  model: clip
  text_mlp:
    in_dim: 768
    hidden_dim: 0
    out_dim: 512
    dropout: 0.1
  video_mlp:
    in_dim: 768
    hidden_dim: 0
    out_dim: 512
    dropout: 0.1

logging_config:
  project_name: "FixedFullFineTuning"
  exp_name: "final_fine_tuning_001"
  log_dir: "final_fine_tuning"
  checkpoint_dir: "experiments/checkpoints/"